name: Cybrog WPF Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore Cybrog.sln --locked-mode

      - name: Build solution (Release)
        run: dotnet build Cybrog.sln --configuration Release --no-restore

      - name: Run tests with coverage
        run: >
          dotnet test Cybrog.Tests/Cybrog.Tests.csproj
          --configuration Release
          --no-build
          --collect:"XPlat Code Coverage"
          --settings coverlet.runsettings
          --logger "trx;logfilename=test-results.trx"
          --parallel
          --blame-hang-timeout 2min
        continue-on-error: false

      - name: Upload test results (TRX)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Test-Results
          path: |
            **/TestResults/*.trx
            **/TestResults/*/coverage.cobertura.xml
          retention-days: 7

      - name: Publish self-contained executable
        run: >
          dotnet publish Cybrog/Cybrog.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --output ./publish
          --no-restore

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Cybrog-Release
          path: ./publish
          retention-days: 30
