name: Cybrog WPF Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    # WPF requires a Windows runner — Linux/macOS cannot build WPF applications.
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. .NET SDK ──────────────────────────────────────────────────────────
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # ── 3. Restore NuGet packages (whole solution: app + test project) ────────
      - name: Restore dependencies
        run: dotnet restore Cybrog.sln

      # ── 4. Build (Release) ────────────────────────────────────────────────────
      - name: Build
        run: dotnet build Cybrog.sln --configuration Release --no-restore

      # ── 5. Run unit tests ──────────────────────────────────────────────────────
      - name: Run tests
        run: >
          dotnet test Cybrog.Tests/Cybrog.Tests.csproj
          --configuration Release
          --no-build
          --verbosity detailed
          --logger "console;verbosity=detailed"
          --logger "trx;logfilename=test-results.trx"
          --diag ./logs/diagnostics.log
        continue-on-error: false

      # ── 5b. Upload test results for debugging
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Test-Results
          path: |
            test-results.trx
            logs/diagnostics.log
          retention-days: 7

      # ── 6. Publish self-contained Windows executable ──────────────────────────
      - name: Publish
        run: >
          dotnet publish Cybrog/Cybrog.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --output ./publish
          --no-restore

      # ── 7. Upload artifact ────────────────────────────────────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Cybrog-Release
          path: ./publish
          retention-days: 30
          
