name: Cybrog WPF Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore Cybrog.sln

      - name: Build
        run: dotnet build Cybrog.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test Cybrog.Tests/Cybrog.Tests.csproj --configuration Release --no-restore --verbosity normal --logger trx --results-directory TestResults
        continue-on-error: true

      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Test-Results
          path: TestResults/
          retention-days: 30

      - name: Publish
        run: >
          dotnet publish Cybrog/Cybrog.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --output ./publish
          --no-restore

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Cybrog-Release
          path: ./publish
          retention-days: 30
