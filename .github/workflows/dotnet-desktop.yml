name: Cybrog WPF Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Speeds up subsequent runs by caching NuGet packages
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore Cybrog.sln --locked-mode

      - name: Build solution (Release)
        run: dotnet build Cybrog.sln --configuration Release --no-restore

      # ============================================================
      # RUN ALL UNIT TESTS
      # IMPORTANT: All dotnet test options MUST come BEFORE the
      # project path to avoid MSBuild unknown switch errors.
      # ============================================================
      - name: Run all unit tests
        run: |
          dotnet test \
            --configuration Release \
            --no-build \
            --logger "trx;logfilename=test-results.trx" \
            --parallel \
            Cybrog.Tests/Cybrog.Tests.csproj
        continue-on-error: false

      # Upload the TRX test results for debugging (always, even if tests fail)
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Test-Results
          path: |
            **/TestResults/*.trx
          retention-days: 7

      # Publish self-contained Windows executable
      - name: Publish self-contained executable
        run: |
          dotnet publish Cybrog/Cybrog.csproj \
            --configuration Release \
            --runtime win-x64 \
            --self-contained true \
            --output ./publish \
            --no-restore

      # Upload the built application as an artifact
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Cybrog-Release
          path: ./publish
          retention-days: 30
